name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (Release)
            os: ubuntu-latest
            build_type: Release
            deps: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev
          - name: Linux (Debug)
            os: ubuntu-latest
            build_type: Debug
            deps: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev
          - name: macOS
            os: macos-latest
            build_type: Release
          - name: Windows
            os: windows-latest
            build_type: Release

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: true

      - name: Install dependencies
        if: matrix.deps
        run: ${{ matrix.deps }}

      - name: Cache raylib build
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-${{ matrix.build_type }}-deps-raylib5.5-${{ hashFiles('CMakeLists.txt') }}

      - name: Build
        run: make BUILD_TYPE=${{ matrix.build_type }}

      - name: Test
        run: make test BUILD_TYPE=${{ matrix.build_type }}

  test:
    name: Tests (no raylib)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: true

      - name: Build & test
        run: make test-core

  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: true

      - name: Build & test
        run: make sanitize && make test
